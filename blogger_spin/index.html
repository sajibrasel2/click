<div style="text-align: center; font-family: sans-serif; padding: 20px; border-radius: 10px;">
  <style>
    /* হুইলের মেইন কন্টেইনার */
    .wheel-container {
      position: relative;
      width: 320px;
      height: 320px;
      margin: 20px auto;
    }

    /* উপরের লাল সূঁচ বা পয়েন্টার */
    .pointer-arrow {
      position: absolute;
      top: -15px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 15px solid transparent;
      border-right: 15px solid transparent;
      border-top: 30px solid #e74c3c;
      z-index: 10;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.4));
    }

    /* স্পিন হুইলের মূল বডি */
    .wheel-body {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 6px solid #2c3e50;
      box-sizing: border-box;
      overflow: hidden;
      position: relative;
      transition: transform 5s cubic-bezier(0.17, 0.67, 0.12, 0.99);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      background: conic-gradient(#1abc9c 0deg 45deg, #3498db 45deg 90deg, #9b59b6 90deg 135deg, #f1c40f 135deg 180deg, #e67e22 180deg 225deg, #e74c3c 225deg 270deg, #34495e 270deg 315deg, #2ecc71 315deg 360deg);
    }

    /* চাকার মাঝখানের সাদা গোল অংশ */
    .wheel-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40px;
      height: 40px;
      background: white;
      border-radius: 50%;
      border: 5px solid #2c3e50;
      z-index: 5;
    }

    /* টেক্সট পজিশনিং লেয়ার */
    .text-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .text-segment {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 110px;
      height: 28px;
      transform-origin: 0 50%;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding-left: 14px;
      color: white;
      font-weight: bold;
      font-size: 15px;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.9);
      box-sizing: border-box;
    }

    .text-segment span {
      display: inline-block;
      transform: rotate(var(--r));
    }

    /* বাটন ও রেজাল্ট টেক্সট */
    .action-btn {
      padding: 12px 30px;
      font-size: 18px;
      font-weight: bold;
      background: #27ae60;
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
      transition: 0.2s;
      margin-top: 20px;
    }

    .action-btn:disabled {
      background: #bdc3c7;
      cursor: not-allowed;
    }

    .result-box {
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
      color: #2c3e50;
      min-height: 30px;
    }
  </style>

  <div class="wheel-container">
    <div class="pointer-arrow"></div>
    <div class="wheel-body" id="wheelBox">
      <!-- চাকার ভেতরের লেখা জাভাস্ক্রিপ্ট দিয়ে আসবে -->
      <div class="text-layer" id="textLayer"></div>
    </div>
    <div class="wheel-center"></div>
  </div>

  <button class="action-btn" id="spnBtn">স্পিন করুন</button>
  <div class="result-box" id="resText"></div>
  <button class="action-btn" id="continueBtn" style="display:none; margin-top:10px;">Continue</button>
</div>

<script>
  const wheelBox = document.getElementById('wheelBox');
  const spnBtn = document.getElementById('spnBtn');
  const resText = document.getElementById('resText');
  const continueBtn = document.getElementById('continueBtn');
  const textLayer = document.getElementById('textLayer');

  const prizes = ["১০", "৫০", "১০০", "২০০", "৫০০", "১০০০", "২০০০", "৫০০০"];

  // ডাইনামিক ভাবে চাকার ভেতরে টেক্সট বসানো হচ্ছে, যেন ব্লগার কোড না ভাঙে
  prizes.forEach((prize, idx) => {
    const div = document.createElement('div');
    div.className = 'text-segment';
    const angle = idx * 45;
    div.style.transform = `translate(-50%, -50%) rotate(${angle}deg) translateX(118px)`;
    div.style.setProperty('--r', `${-angle}deg`);
    div.innerHTML = `<span>${prize}</span>`;
    textLayer.appendChild(div);
  });

  let currentDeg = 0;

  spnBtn.addEventListener('click', () => {
    spnBtn.disabled = true;

    // "ঘুরছে..." লেখার ইউনিকোড
    resText.innerText = "\u0998\u09c1\u09b0\u099b\u09c7...";

    const winIdx = Math.floor(Math.random() * prizes.length);
    const centerAngle = (winIdx * 45) + 22.5;

    let targetDeg = currentDeg + (360 * 5); // ৫ বার ঘুরবে
    let remainder = targetDeg % 360;
    let adjust = (360 - centerAngle) - remainder;
    if (adjust < 0) { adjust += 360; }

    currentDeg = targetDeg + adjust;
    wheelBox.style.transform = 'rotate(' + currentDeg + 'deg)';

    setTimeout(() => {
      // ইংরেজি সংখ্যাকে বাংলায় কনভার্ট করার নিয়ম
      const bngNums = { '0': '\u09e6', '1': '\u09e7', '2': '\u09e8', '3': '\u09e9', '4': '\u09ea', '5': '\u09eb', '6': '\u09ec', '7': '\u09ed', '8': '\u09ee', '9': '\u09ef' };
      const wonNum = prizes[winIdx].split('').map(c => bngNums[c] || c).join('');

      // "অভিনন্দন! আপনি জিতেছেন..." লেখার ইউনিকোড আউটপুট
      resText.innerText = "\u0985\u09ad\u09bf\u09a8\u09a8\u09cd\u09a6\u09a8! \u0986\u09aa\u09a8\u09bf \u099c\u09bf\u09a4\u09c7\u099b\u09c7\u09a8 " + wonNum + " \u099f\u09be\u0995\u09be!";
      spnBtn.disabled = false;
      // Show Continue button linking to second site (rewardtojishu)
      continueBtn.style.display = 'inline-block';
      continueBtn.onclick = () => { window.location.href = 'https://rewardtojishu.blogspot.com/2026/05/blog-post.html'; };

    }, 5200);
  });
</script>
